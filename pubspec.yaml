name: replicore
description: |
  Enterprise-grade local-first synchronization framework for Flutter.
  
  Replicore is a production-ready, pluggable sync engine that seamlessly bridges
  local SQLite databases with remote backends (Supabase, REST APIs, etc.).
  It handles offline-first data synchronization, conflict resolution, 
  incremental syncing, and comprehensive error recovery out of the box.
  
  Perfect for building offline-capable enterprise applications with 
  automatic sync, conflict resolution strategies, and advanced monitoring.

version: 0.4.0
homepage: https://github.com/leonhardWullich/replicore
repository: https://github.com/leonhardWullich/replicore
documentation: https://github.com/leonhardWullich/replicore/docs
issue_tracker: https://github.com/leonhardWullich/replicore/issues

environment:
  sdk: ^3.10.8
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.4.2
  supabase_flutter: ^2.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

